# variables
$EDP1_DATE_LABEL_RIGHT_POSITION = -300
$EDP1_DATE_LABEL_TOP_POSITION = 80
$EDP1_DATE_LABEL_POSITION = $EDP1_DATE_LABEL_RIGHT_POSITION, $EDP1_DATE_LABEL_TOP_POSITION

$EDP1_TIME_LABEL_RIGHT_POSITION = -575
$EDP1_TIME_LABEL_TOP_POSITION = 250
$EDP1_TIME_LABEL_POSITION = $EDP1_TIME_LABEL_RIGHT_POSITION, $EDP1_TIME_LABEL_TOP_POSITION

$EDP1_IMAGE_RIGHT_POSITION = -550

# BACKGROUND
background {
    monitor =
    #path = screenshot
    path = $HOME/wallpaper/post-apocalyptic_hacker.png
    #color = $background
    blur_passes = 0.5
    contrast = 1
    brightness = 1
    vibrancy = 0
    vibrancy_darkness = 0
}

# GENERAL
general {
    no_fade_in = true
    no_fade_out = true
    hide_cursor = false
    grace = 0
    disable_loading_bar = false
    fractional_scaling = 1
}

input-field {
    monitor = eDP-1 
    size = 500, 50
    outline_thickness = 0
    dots_size = 0.25 # Scale of input-field height, 0.2 - 0.8
    dots_spacing = 0.55 # Scale of dots' absolute size, 0.0 - 1.0
    dots_center = true
    dots_rounding = -1
    rounding = 5
    outline_thickness = 0
    outer_color = rgba(104, 88, 65, 1) 
    inner_color = rgba(104, 88, 65, 1.0) 
    font_color = rgba(0, 0, 10, 1) 
    fade_on_empty = false
    placeholder_text = Input your password # Text rendered in the input box when it's empty.
    check_color = rgba(204, 136, 34, 0)
    fail_color = rgba(204, 34, 34, 0) # if authentication failed, changes outer_color and fail message color
    fail_text = $FAIL <b>($ATTEMPTS)</b> # can be set to empty
    fail_transition = 200 # transition time in ms between normal outer_color and fail_color
    fail_timeout = 500
    capslock_color = -1
    numlock_color = -1
    bothlock_color = -1 # when both locks are active. -1 means don't change outer color (same for above)
    invert_numlock = false # change color if numlock is off
    swap_font_color = false # see below
    position = -15%, -5%
    halign = right
    valign = center
}

# TIME
label {
  monitor = eDP-1 
  text = cmd[update:1000] echo "$(date +"%-I:%M")"
  color = rgba(104, 88, 65, 1) 
  font_size = 250
  text_align = center
  font_family = Fragile Bombers Attack
  position = -15%, 12%
  halign = right
  valign = center
}

# DATE
label {
  monitor = eDP-1 
  text = cmd[update:1000] echo "$(date +"%A, %B %d")"
  color = rgba(104, 88, 65, 1)
  font_size = 85
  font_family = Fragile Bombers Attack 
  position = -10%, 2%
  halign = right
  valign = center
}


