# BACKGROUND
background {
    monitor =
    #path = screenshot
    path = $HOME/.config/ml4w/cache/blurred_wallpaper.png   # only png supported for now 
    #color = $background
    blur_passes = 2
    contrast = 1
    brightness = 0.5
    vibrancy = 0.2
    vibrancy_darkness = 0.2
}

# GENERAL
general {
    no_fade_in = true
    no_fade_out = true
    hide_cursor = false
    grace = 0
    disable_loading_bar = true
}

# Profile Picture
